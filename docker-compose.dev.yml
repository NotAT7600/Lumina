version: "3.9"

# Local Development Compose File
# Spins up the Python Backend with all attached tools (nmap, sqli, httpx, etc.)
# AND a safe test target container.
# Leaves the Frontend and local Ollama instance running natively on your Mac.

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: lumina-dev-backend
    ports:
      # Exposes Backend API on http://localhost:8000
      - "8000:8000"
    environment:
      # Connect to mac's native ollama via Docker's host gateway
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY:-}
      - FEATHERLESS_MODEL=${FEATHERLESS_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}

      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - LUMINA_BASE_URL=${LUMINA_BASE_URL:-http://localhost:3000}
      - REPO_CLONE_ROOT=/var/lumina/repos
      - REPO_CLONE_TIMEOUT_SECONDS=${REPO_CLONE_TIMEOUT_SECONDS:-180}
      - REPO_CLONE_DEPTH=${REPO_CLONE_DEPTH:-1}
      # Make sure the backend allows scanning host.docker.internal and the target container
      - ALLOWED_TARGETS=${ALLOWED_TARGETS:-target,host.docker.internal,localhost,127.0.0.1}
    volumes:
      # Hot reload the code so you don't have to rebuild docker on every python change
      - ./backend:/app/backend:ro
      - ./repos:/repos:ro
      - lumina-repos:/var/lumina/repos
      # Allow scanning host local folders directly by absolute path
      - /tmp:/tmp:ro
      - /Users:/Users:ro
    extra_hosts:
      # Allows Linux docker containers to ping native Mac localhost as 'host.docker.internal'
      - "host.docker.internal:host-gateway"

  target:
    image: bkimminich/juice-shop
    container_name: lumina-dev-target
    ports:
      # Exposes Juice Shop on http://localhost:3001
      - "3001:3000"

volumes:
  lumina-repos:
