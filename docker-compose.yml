services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - pentest-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY:-}
      - FEATHERLESS_MODEL=${FEATHERLESS_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}

      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - LUMINA_BASE_URL=${LUMINA_BASE_URL:-http://localhost:3000}
      - ALLOWED_TARGETS=${ALLOWED_TARGETS:-target,localhost,127.0.0.1}
      - REPO_CLONE_ROOT=/var/lumina/repos
      - REPO_CLONE_TIMEOUT_SECONDS=${REPO_CLONE_TIMEOUT_SECONDS:-180}
      - REPO_CLONE_DEPTH=${REPO_CLONE_DEPTH:-1}
    volumes:
      - ./repos:/repos:ro
      - lumina-repos:/var/lumina/repos
    networks:
      - pentest-net
    depends_on:
      ollama:
        condition: service_healthy
      target:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  target:
    image: bkimminich/juice-shop
    ports:
      - "3001:3000"
    networks:
      - pentest-net

volumes:
  ollama-data:
  lumina-repos:

networks:
  pentest-net:
    driver: bridge
